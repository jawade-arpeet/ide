name: "ide"

services:
    postgres:
        container_name: "ide-postgres"
        image: "postgres:18"
        environment:
            POSTGRES_USER: "engineer"
            POSTGRES_PASSWORD: "password"
            POSTGRES_DB: "ide_db"
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/

volumes:
    postgres_data:
